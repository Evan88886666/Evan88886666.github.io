<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evan | Tetris Mini Game</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e3a8a, #020617 55%, #000);
      color: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .game-container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    canvas {
      background: #020617;
      border: 2px solid #38bdf8;
      border-radius: 12px;
    }

    .side-panel {
      width: 230px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #38bdf8;
    }

    .score-box {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .score-box p {
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .score-box span {
      font-size: 28px;
      font-weight: bold;
    }

    .info {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 22px;
      font-size: 15px;
    }

    button, a {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button {
      background: #38bdf8;
      color: #020617;
    }

    button:hover {
      background: #7dd3fc;
    }

    a {
      border: 1px solid #64748b;
      color: #f8fafc;
    }

    a:hover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    .game-over {
      color: #f87171;
      font-weight: bold;
      margin-top: 12px;
      min-height: 24px;
    }

    @media (max-width: 900px) {
      .game-container {
        flex-direction: column;
        align-items: center;
      }

      .side-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="game-container">
    <canvas id="game"></canvas>

    <div class="side-panel">
      <h1>Tetris</h1>

      <div class="score-box">
        <p>Score</p>
        <span id="score">0</span>
      </div>

      <div class="score-box">
        <p>Level</p>
        <span id="level">1</span>
      </div>

      <div class="info">
        <p><strong>Controls</strong></p>
        <p>← Move Left</p>
        <p>→ Move Right</p>
        <p>↓ Move Down</p>
        <p>↑ Rotate</p>
        <p>Space Drop</p>
        <br />
        <p>The falling speed increases over time.</p>
      </div>

      <button onclick="restartGame()">Restart Game</button>
      <a href="index.html">Back to Home</a>

      <div class="game-over" id="gameOverText"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const levelElement = document.getElementById("level");
    const gameOverText = document.getElementById("gameOverText");

    // Larger game area
    const ROWS = 24;
    const COLS = 14;
    const BLOCK_SIZE = 28;

    canvas.width = COLS * BLOCK_SIZE;
    canvas.height = ROWS * BLOCK_SIZE;

    const COLORS = [
      null,
      "#38bdf8",
      "#818cf8",
      "#facc15",
      "#4ade80",
      "#fb7185",
      "#f97316",
      "#a78bfa"
    ];

    const SHAPES = [
      [],
      [[1, 1, 1, 1]],
      [[2, 0, 0], [2, 2, 2]],
      [[0, 0, 3], [3, 3, 3]],
      [[4, 4], [4, 4]],
      [[0, 5, 5], [5, 5, 0]],
      [[6, 6, 0], [0, 6, 6]],
      [[0, 7, 0], [7, 7, 7]]
    ];

    let board;
    let piece;
    let score;
    let level;
    let gameOver;
    let dropCounter;
    let dropInterval;
    let lastTime;
    let startTime;
    let animationId;

    const INITIAL_DROP_INTERVAL = 750;
    const MIN_DROP_INTERVAL = 120;
    const SPEED_UP_EVERY = 15000;
    const SPEED_STEP = 55;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function createPiece() {
      const type = Math.floor(Math.random() * 7) + 1;
      return {
        matrix: SHAPES[type],
        row: 0,
        col: Math.floor(COLS / 2) - 2
      };
    }

    function drawBlock(x, y, color) {
      context.fillStyle = color;
      context.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

      context.strokeStyle = "#020617";
      context.lineWidth = 2;
      context.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    }

    function drawBoard() {
      context.clearRect(0, 0, canvas.width, canvas.height);

      board.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            drawBlock(x, y, COLORS[value]);
          }
        });
      });
    }

    function drawPiece() {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            drawBlock(piece.col + x, piece.row + y, COLORS[value]);
          }
        });
      });
    }

    function collide(board, piece) {
      const matrix = piece.matrix;

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {
          if (
            matrix[y][x] &&
            (
              board[piece.row + y] === undefined ||
              board[piece.row + y][piece.col + x] === undefined ||
              board[piece.row + y][piece.col + x] !== 0
            )
          ) {
            return true;
          }
        }
      }

      return false;
    }

    function merge(board, piece) {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[piece.row + y][piece.col + x] = value;
          }
        });
      });
    }

    function clearLines() {
      let linesCleared = 0;

      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) {
            continue outer;
          }
        }

        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        y++;
        linesCleared++;
      }

      if (linesCleared > 0) {
        score += linesCleared * 100 * level;
        scoreElement.textContent = score;
      }
    }

    function updateSpeed(time) {
      const elapsed = time - startTime;
      level = Math.floor(elapsed / SPEED_UP_EVERY) + 1;
      dropInterval = Math.max(
        MIN_DROP_INTERVAL,
        INITIAL_DROP_INTERVAL - (level - 1) * SPEED_STEP
      );

      levelElement.textContent = level;
    }

    function movePiece(direction) {
      piece.col += direction;

      if (collide(board, piece)) {
        piece.col -= direction;
      }
    }

    function dropPiece() {
      piece.row++;

      if (collide(board, piece)) {
        piece.row--;
        merge(board, piece);
        clearLines();
        piece = createPiece();

        if (collide(board, piece)) {
          gameOver = true;
          gameOverText.textContent = "Game Over!";
        }
      }

      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide(board, piece)) {
        piece.row++;
      }

      piece.row--;
      merge(board, piece);
      clearLines();
      piece = createPiece();

      if (collide(board, piece)) {
        gameOver = true;
        gameOverText.textContent = "Game Over!";
      }

      dropCounter = 0;
    }

    function rotate(matrix) {
      return matrix[0].map((_, index) =>
        matrix.map(row => row[index]).reverse()
      );
    }

    function rotatePiece() {
      const originalMatrix = piece.matrix;
      piece.matrix = rotate(piece.matrix);

      if (collide(board, piece)) {
        piece.matrix = originalMatrix;
      }
    }

    function update(time = 0) {
      if (gameOver) {
        drawBoard();
        drawPiece();
        cancelAnimationFrame(animationId);
        return;
      }

      if (!startTime) {
        startTime = time;
      }

      const deltaTime = time - lastTime;
      lastTime = time;
      dropCounter += deltaTime;

      updateSpeed(time);

      if (dropCounter > dropInterval) {
        dropPiece();
      }

      drawBoard();
      drawPiece();

      animationId = requestAnimationFrame(update);
    }

    function restartGame() {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      board = createBoard();
      piece = createPiece();
      score = 0;
      level = 1;
      gameOver = false;
      dropCounter = 0;
      dropInterval = INITIAL_DROP_INTERVAL;
      lastTime = 0;
      startTime = 0;

      scoreElement.textContent = score;
      levelElement.textContent = level;
      gameOverText.textContent = "";

      animationId = requestAnimationFrame(update);
    }

    document.addEventListener("keydown", event => {
      if (gameOver) return;

      if (event.key === "ArrowLeft") {
        movePiece(-1);
      } else if (event.key === "ArrowRight") {
        movePiece(1);
      } else if (event.key === "ArrowDown") {
        dropPiece();
      } else if (event.key === "ArrowUp") {
        rotatePiece();
      } else if (event.code === "Space") {
        event.preventDefault();
        hardDrop();
      }
    });

    restartGame();
  </script>
</body>
</html>
