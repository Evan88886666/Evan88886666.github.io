<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evan | Snake Mini Game</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #064e3b, #020617 55%, #000);
      color: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .game-container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    canvas {
      background: #020617;
      border: 2px solid #34d399;
      border-radius: 12px;
    }

    .side-panel {
      width: 230px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #34d399;
    }

    .score-box {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .score-box p {
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .score-box span {
      font-size: 28px;
      font-weight: bold;
    }

    .info {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 22px;
      font-size: 15px;
    }

    button, a {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button {
      background: #34d399;
      color: #020617;
    }

    button:hover {
      background: #6ee7b7;
    }

    a {
      border: 1px solid #64748b;
      color: #f8fafc;
    }

    a:hover {
      border-color: #34d399;
      color: #34d399;
    }

    .game-over {
      color: #f87171;
      font-weight: bold;
      margin-top: 12px;
      min-height: 24px;
    }

    @media (max-width: 850px) {
      .game-container {
        flex-direction: column;
        align-items: center;
      }

      .side-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="game-container">
    <canvas id="game"></canvas>

    <div class="side-panel">
      <h1>Snake</h1>

      <div class="score-box">
        <p>Score</p>
        <span id="score">0</span>
      </div>

      <div class="score-box">
        <p>Level</p>
        <span id="level">1</span>
      </div>

      <div class="info">
        <p><strong>Controls</strong></p>
        <p>↑ Move Up</p>
        <p>↓ Move Down</p>
        <p>← Move Left</p>
        <p>→ Move Right</p>
        <p>Space Pause</p>
        <br />
        <p>The snake gets faster as your score increases.</p>
      </div>

      <button onclick="restartGame()">Restart Game</button>
      <a href="index.html">Back to Home</a>

      <div class="game-over" id="gameOverText"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const levelElement = document.getElementById("level");
    const gameOverText = document.getElementById("gameOverText");

    const GRID_SIZE = 24;
    const BLOCK_SIZE = 24;

    canvas.width = GRID_SIZE * BLOCK_SIZE;
    canvas.height = GRID_SIZE * BLOCK_SIZE;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let level;
    let gameOver;
    let paused;
    let lastTime;
    let moveCounter;
    let moveInterval;
    let animationId;

    const INITIAL_MOVE_INTERVAL = 160;
    const MIN_MOVE_INTERVAL = 65;

    function restartGame() {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      snake = [
        { x: 12, y: 12 },
        { x: 11, y: 12 },
        { x: 10, y: 12 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };

      score = 0;
      level = 1;
      gameOver = false;
      paused = false;
      lastTime = 0;
      moveCounter = 0;
      moveInterval = INITIAL_MOVE_INTERVAL;

      scoreElement.textContent = score;
      levelElement.textContent = level;
      gameOverText.textContent = "";

      placeFood();
      animationId = requestAnimationFrame(update);
    }

    function placeFood() {
      let newFood;

      do {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake.some(part => part.x === newFood.x && part.y === newFood.y));

      food = newFood;
    }

    function updateSpeed() {
      level = Math.floor(score / 5) + 1;
      moveInterval = Math.max(
        MIN_MOVE_INTERVAL,
        INITIAL_MOVE_INTERVAL - (level - 1) * 12
      );

      levelElement.textContent = level;
    }

    function update(time = 0) {
      if (gameOver) {
        draw();
        cancelAnimationFrame(animationId);
        return;
      }

      const deltaTime = time - lastTime;
      lastTime = time;

      if (!paused) {
        moveCounter += deltaTime;

        if (moveCounter > moveInterval) {
          moveSnake();
          moveCounter = 0;
        }
      }

      draw();
      animationId = requestAnimationFrame(update);
    }

    function moveSnake() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= GRID_SIZE ||
        head.y < 0 ||
        head.y >= GRID_SIZE ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver = true;
        gameOverText.textContent = "Game Over!";
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreElement.textContent = score;
        updateSpeed();
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      context.clearRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      context.fillStyle = "#f87171";
      drawRoundedBlock(food.x, food.y);

      snake.forEach((part, index) => {
        context.fillStyle = index === 0 ? "#6ee7b7" : "#34d399";
        drawRoundedBlock(part.x, part.y);
      });

      if (paused && !gameOver) {
        context.fillStyle = "rgba(2, 6, 23, 0.7)";
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.fillStyle = "#f8fafc";
        context.font = "bold 36px Arial";
        context.textAlign = "center";
        context.fillText("Paused", canvas.width / 2, canvas.height / 2);
      }
    }

    function drawGrid() {
      context.strokeStyle = "rgba(148, 163, 184, 0.08)";
      context.lineWidth = 1;

      for (let i = 0; i <= GRID_SIZE; i++) {
        context.beginPath();
        context.moveTo(i * BLOCK_SIZE, 0);
        context.lineTo(i * BLOCK_SIZE, canvas.height);
        context.stroke();

        context.beginPath();
        context.moveTo(0, i * BLOCK_SIZE);
        context.lineTo(canvas.width, i * BLOCK_SIZE);
        context.stroke();
      }
    }

    function drawRoundedBlock(x, y) {
      const padding = 2;
      const radius = 6;

      const px = x * BLOCK_SIZE + padding;
      const py = y * BLOCK_SIZE + padding;
      const size = BLOCK_SIZE - padding * 2;

      context.beginPath();
      context.moveTo(px + radius, py);
      context.lineTo(px + size - radius, py);
      context.quadraticCurveTo(px + size, py, px + size, py + radius);
      context.lineTo(px + size, py + size - radius);
      context.quadraticCurveTo(px + size, py + size, px + size - radius, py + size);
      context.lineTo(px + radius, py + size);
      context.quadraticCurveTo(px, py + size, px, py + size - radius);
      context.lineTo(px, py + radius);
      context.quadraticCurveTo(px, py, px + radius, py);
      context.fill();
    }

    document.addEventListener("keydown", event => {
      if (
        event.key === "ArrowUp" ||
        event.key === "ArrowDown" ||
        event.key === "ArrowLeft" ||
        event.key === "ArrowRight" ||
        event.code === "Space"
      ) {
        event.preventDefault();
      }

      if (event.code === "Space") {
        if (!gameOver) {
          paused = !paused;
        }
        return;
      }

      if (paused || gameOver) return;

      if (event.key === "ArrowUp" && direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      } else if (event.key === "ArrowDown" && direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      } else if (event.key === "ArrowLeft" && direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      } else if (event.key === "ArrowRight" && direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
    });

    restartGame();
  </script>
</body>
</html>
